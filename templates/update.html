{% extends "base.html" %}
{% block body %}
    
         

<div class="container">
    <h1>Update your todo</h1>
    <form action="/update/{{todo.sno}}" method="POST">
  <div class="mb-3">
    <label for="title" class="form-label">Add a Title</label>
    <input type="text" class="form-control" name="title" value={{todo.title}} id="title" aria-describedby="emailHelp">
    
  </div>
  <div class="mb-3">
    <label for="Discription" class="form-label">Add a Discription</label>
    <input type="text" class="form-control" name="desc" value={{todo.desc}} id="Discription">
  </div>
  
  <button type="submit" class="btn btn-primary">Update</button>
</form>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
{% endblock body %}
